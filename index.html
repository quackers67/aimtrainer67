<!DOCTYPE html>
<html lang="en" data-theme="mint">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aim Trainer</title>
    <style>
        :root, [data-theme="mint"] {
            --bg-sidebar: #0f1115;
            --bg-game: #07080a;
            --border: #1e222b;
            --text: #f3f4f6;
            --text-muted: #6b7280;
            --accent: #00f5b4; 
            --target: #ff3b6f;
            --dropdown-bg: #0f1115;
            --dropdown-text: #f3f4f6;
        }

        [data-theme="dark"] {
            --bg-sidebar: #151515;
            --bg-game: #0d0d0d;
            --border: #262626;
            --text: #e5e5e5;
            --text-muted: #737373;
            --accent: #a855f7;
            --target: #f43f5e;
            --dropdown-bg: #151515;
            --dropdown-text: #e5e5e5;
        }

        [data-theme="light"] {
            --bg-sidebar: #f4f4f7;
            --bg-game: #ffffff;
            --border: #e4e4e7;
            --text: #18181b;
            --text-muted: #a1a1aa;
            --accent: #2563eb;
            --target: #ef4444;
            --dropdown-bg: #ffffff;
            --dropdown-text: #18181b;
        }

        [data-theme="matrix"] {
            --bg-sidebar: #020604;
            --bg-game: #000000;
            --border: #052e16;
            --text: #4ade80;
            --text-muted: #14532d;
            --accent: #22c55e;
            --target: #16a34a;
            --dropdown-bg: #020604;
            --dropdown-text: #4ade80;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: var(--bg-game);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            user-select: none; 
        }
        
        #sidebar { 
            width: 320px; 
            min-width: 320px;
            background: var(--bg-sidebar); 
            padding: 24px; 
            border-right: 1px solid var(--border); 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        #sidebar::-webkit-scrollbar {
            width: 6px;
        }

        #sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        #sidebar::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        h2 { font-size: 12px; letter-spacing: 1.5px; margin: 0 0 6px 0; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        .setting-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }

        input, select, button { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 14px 16px; 
            border-radius: 8px; 
            width: 100%; 
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0;
            outline: none;
        }

        [data-theme="light"] input[type="range"] {
            background: rgba(0, 0, 0, 0.05);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 12px;
            border-radius: 6px;
            background: var(--accent);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 12px;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.1);
        }
        
        select {
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
            padding-right: 40px;
            background-color: var(--dropdown-bg);
            color: var(--dropdown-text);
        }

        select option {
            background-color: var(--dropdown-bg) !important;
            color: var(--dropdown-text) !important;
        }

        [data-theme="light"] input:not([type="range"]), [data-theme="light"] select { 
            background-color: #ffffff; 
            color: #18181b;
        }
        
        input:focus, select:focus { border-color: var(--accent); }

        button { background: var(--accent); color: #000; font-weight: 600; cursor: pointer; border: none; margin-top: 5px; }
        button:hover { opacity: 0.9; }
        #resetBtn { background: rgba(255, 59, 111, 0.1); color: #ff3b6f; border: 1px solid rgba(255, 59, 111, 0.2); }
        #resetBtn:hover { background: rgba(255, 59, 111, 0.2); }

        #gameArea { flex-grow: 1; position: relative; background: var(--bg-game); }

        #hud {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 28px;
            background: var(--bg-sidebar);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            pointer-events: none;
            z-index: 5;
            align-items: center;
        }

        .hud-stat { text-align: center; white-space: nowrap; }
        .hud-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 2px; }
        .hud-value { font-size: 18px; color: var(--accent); font-variant-numeric: tabular-nums; font-weight: 700; }
        
        .hud-divider {
            height: 24px;
            width: 1px;
            background: var(--border);
        }
        .hud-target-display {
            font-size: 11px;
            color: var(--text);
            font-weight: 500;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .hud-target-display b { color: var(--accent); font-variant-numeric: tabular-nums; }

        #targetCriteria {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            background: rgba(255,255,255,0.01);
            padding: 14px;
            border-radius: 8px;
            border: 1px dashed var(--border);
            line-height: 1.6;
        }

        canvas { display: block; cursor: none; width: 100%; height: 100%; }
        
        #overlay { 
            position: absolute; 
            inset: 0; 
            background: rgba(7, 8, 10, 0.85); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
            cursor: pointer; 
            backdrop-filter: blur(8px);
        }
        [data-theme="dark"] #overlay { background: rgba(13, 13, 13, 0.85); }
        [data-theme="light"] #overlay { background: rgba(255, 255, 255, 0.85); }
        [data-theme="matrix"] #overlay { background: rgba(0, 0, 0, 0.9); }

        #overlay h1 { color: var(--accent); margin: 0 0 12px 0; font-size: 32px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; text-align: center;}
        #overlay p { color: var(--text-muted); margin: 0; font-size: 14px; text-align: center; line-height: 1.6; max-width: 360px; }

        #countdownText {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: 800;
            color: var(--accent);
            pointer-events: none;
            z-index: 20;
            display: none;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Mode</h2>
    <div class="setting-group">
        <select id="modeSelectRoot">
            <option value="sandbox">Custom</option>
            <option value="arcade">Game</option>
        </select>
    </div>

    <div id="targetCriteria">
        Select a configuration.
    </div>

    <div class="setting-group" id="timeWrapper">
        <label>Time</label>
        <select id="timeLimit">
            <option value="15">15s</option>
            <option value="30">30s</option>
            <option value="infinite">Endless</option>
        </select>
    </div>

    <div id="sandboxTuningPanel">
        <h2>Tuning</h2>
        <div class="setting-group">
            <label>Type</label>
            <select id="mode">
                <option value="flick">Static</option>
                <option value="follow">Dynamic</option>
            </select>
        </div>
        
        <div class="setting-group">
            <label>Speed</label>
            <select id="speedSelect">
                <option value="0">None</option>
                <option value="5">Slow</option>
                <option value="12">Mid</option>
                <option value="18">Fast</option>
                <option value="25">Max</option>
            </select>
        </div>

        <div class="setting-group">
            <label>Size</label>
            <select id="sizeSelect">
                <option value="45">Huge</option>
                <option value="28">Big</option>
                <option value="16">Mid</option>
                <option value="9">Tiny</option>
            </select>
        </div>
    </div>

    <h2>Input</h2>
    <div class="setting-group"><label>DPI</label><input type="number" id="dpi" value="400"></div>
    <div class="setting-group"><label>Sens</label><input type="number" id="sens" value="0.23" step="0.01"></div>
    
    <h2>Crosshair</h2>
    <div class="setting-group">
        <label>Crosshair Size</label>
        <input type="range" id="crosshairSize" min="4" max="24" value="10">
    </div>

    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 20px;">
        <div>
            <h2>Style</h2>
            <div class="setting-group">
                <select id="themeSelect">
                    <option value="mint">Mint</option>
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                    <option value="matrix">Matrix</option>
                </select>
            </div>
        </div>
        <button id="resetBtn">RESET SETTINGS</button>
    </div>
</div>

<div id="gameArea">
    <div id="hud">
        <div class="hud-stat"><div class="hud-label" id="hudTimeLabel">Time</div><div id="timeVal" class="hud-value">15s</div></div>
        <div class="hud-stat"><div class="hud-label">Hits</div><div id="scoreVal" class="hud-value">0</div></div>
        <div class="hud-stat"><div class="hud-label">Acc</div><div id="accVal" class="hud-value">100%</div></div>
        <div class="hud-divider"></div>
        <div class="hud-target-display" id="hudTargetGoal">Hits: <b>0/0</b> | Acc: <b>100%/0%</b></div>
    </div>

    <div id="countdownText">3</div>

    <div id="overlay">
        <h1 id="overlayTitle">START SANDBOX</h1>
        <p id="overlayDesc">Click canvas window to initiate lock.</p>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayDesc = document.getElementById('overlayDesc');
    const countdownText = document.getElementById('countdownText');
    
    const scoreVal = document.getElementById('scoreVal');
    const accVal = document.getElementById('accVal');
    const timeVal = document.getElementById('timeVal');
    const hudTimeLabel = document.getElementById('hudTimeLabel');
    const targetCriteria = document.getElementById('targetCriteria');
    const hudTargetGoal = document.getElementById('hudTargetGoal');

    const themeSelect = document.getElementById('themeSelect');
    const modeSelectRoot = document.getElementById('modeSelectRoot');
    const timeLimitSelect = document.getElementById('timeLimit');
    const timeWrapper = document.getElementById('timeWrapper');
    const sandboxTuningPanel = document.getElementById('sandboxTuningPanel');
    
    const modeSelect = document.getElementById('mode');
    const speedSelect = document.getElementById('speedSelect');
    const sizeSelect = document.getElementById('sizeSelect');
    const dpiInput = document.getElementById('dpi');
    const sensInput = document.getElementById('sens');
    const crosshairSize = document.getElementById('crosshairSize');
    const resetBtn = document.getElementById('resetBtn');

    let player = { x: 0, y: 0 };
    let target = { x: 0, y: 0, vx: 0, vy: 0 };
    let isLocked = false;
    let gameActive = false;
    let inCountdown = false;
    let isHoveringTarget = false; 

    let score = 0;
    let totalClicks = 0;
    let timeRemaining = 0;
    let timerInterval = null;

    let currentTier = 1;
    const tiers = {
        1:  { name: "Tier 1", size: 45, speed: 0,  mode: 'flick',  reqScore: 10, reqAcc: 70,  time: 15 },
        2:  { name: "Tier 2", size: 38, speed: 0,  mode: 'flick',  reqScore: 14, reqAcc: 75,  time: 15 },
        3:  { name: "Tier 3", size: 32, speed: 0,  mode: 'flick',  reqScore: 18, reqAcc: 80,  time: 15 },
        4:  { name: "Tier 4", size: 26, speed: 0,  mode: 'flick',  reqScore: 22, reqAcc: 85,  time: 15 },
        5:  { name: "Tier 5", size: 18, speed: 0,  mode: 'flick',  reqScore: 25, reqAcc: 90,  time: 15 },
        6:  { name: "Tier 6", size: 28, speed: 6,  mode: 'follow', reqScore: 15, reqAcc: 75,  time: 15 },
        7:  { name: "Tier 7", size: 22, speed: 10, mode: 'follow', reqScore: 18, reqAcc: 80,  time: 15 },
        8:  { name: "Tier 8", size: 16, speed: 14, mode: 'follow', reqScore: 20, reqAcc: 85,  time: 15 },
        9:  { name: "Tier 9", size: 12, speed: 18, mode: 'follow', reqScore: 24, reqAcc: 90,  time: 15 },
        10: { name: "Tier 10", size: 8,  speed: 25, mode: 'follow', reqScore: 28, reqAcc: 93,  time: 15 }
    };

    function saveSettings() {
        const settings = {
            theme: themeSelect.value,
            rootMode: modeSelectRoot.value,
            timeLimit: timeLimitSelect.value,
            tuningMode: modeSelect.value,
            speed: speedSelect.value,
            size: sizeSelect.value,
            dpi: dpiInput.value,
            sens: sensInput.value,
            crosshairSize: crosshairSize.value,
            currentTier: currentTier
        };
        localStorage.setItem('aimtrainer_settings', JSON.stringify(settings));
    }

    function applyThemeAttribute(themeName) {
        document.documentElement.setAttribute('data-theme', themeName);
    }

    function loadSettings() {
        const stored = localStorage.getItem('aimtrainer_settings');
        if (!stored) {
            applyThemeAttribute("mint");
            return;
        }
        try {
            const settings = JSON.parse(stored);
            themeSelect.value = settings.theme || "mint";
            modeSelectRoot.value = settings.rootMode || "sandbox";
            timeLimitSelect.value = settings.timeLimit || "15";
            modeSelect.value = settings.tuningMode || "flick";
            speedSelect.value = settings.speed || "12";
            sizeSelect.value = settings.size || "28";
            dpiInput.value = settings.dpi || "400";
            sensInput.value = settings.sens || "0.23";
            crosshairSize.value = settings.crosshairSize || "10";
            currentTier = settings.currentTier || 1;

            applyThemeAttribute(themeSelect.value);
        } catch (e) {
            applyThemeAttribute("mint");
        }
    }

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        if (!isLocked) {
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
        }
    }
    window.addEventListener('resize', resize);
    setTimeout(resize, 0);

    themeSelect.addEventListener('change', (e) => {
        applyThemeAttribute(e.target.value);
        saveSettings();
    });

    function updateSystemView() {
        const isArcade = modeSelectRoot.value === 'arcade';
        const finalAcc = totalClicks === 0 ? 100 : Math.round((score / totalClicks) * 100);
        
        if (isArcade) {
            sandboxTuningPanel.style.display = "none";
            timeWrapper.style.display = "none";
            hudTimeLabel.textContent = "Time";
            
            const activeConfig = tiers[currentTier];
            targetCriteria.innerHTML = `Campaign Mode: <b>${activeConfig.name}</b><br>Goal: <b>${activeConfig.reqScore} Hits</b><br>Required Accuracy: <b>${activeConfig.reqAcc}%</b>`;
            hudTargetGoal.innerHTML = `Hits: <b>${score}/${activeConfig.reqScore}</b> | Acc: <b>${finalAcc}%/${activeConfig.reqAcc}%</b>`;
            
            timeVal.textContent = activeConfig.time + "s";
            overlayTitle.textContent = `START ${activeConfig.name.toUpperCase()}`;
            overlayDesc.textContent = "Click canvas window to initiate lock.";
        } else {
            sandboxTuningPanel.style.display = "block";
            timeWrapper.style.display = "block";
            
            targetCriteria.innerHTML = "Custom Sandbox Mode:<br>Configure properties below.";
            hudTargetGoal.innerHTML = "Mode: <b>Sandbox</b>";
            timeVal.textContent = timeLimitSelect.value === 'infinite' ? "LOOP" : timeLimitSelect.value + "s";
            hudTimeLabel.textContent = timeLimitSelect.value === 'infinite' ? "Mode" : "Time";
            overlayTitle.textContent = "START SANDBOX";
            overlayDesc.textContent = "Click canvas window to initiate lock.";
        }
    }

    [modeSelectRoot, timeLimitSelect, modeSelect, speedSelect, sizeSelect].forEach(element => {
        element.addEventListener('change', () => {
            updateSystemView();
            saveSettings();
        });
    });

    [dpiInput, sensInput, crosshairSize].forEach(element => {
        element.addEventListener('input', saveSettings);
    });

    overlay.addEventListener('click', () => {
        canvas.requestPointerLock();
    });

    document.addEventListener('pointerlockchange', () => {
        isLocked = document.pointerLockElement === canvas;
        if (isLocked) {
            overlay.style.display = 'none';
            if (!gameActive && !inCountdown) {
                runStartCountdown();
            }
        } else {
            overlay.style.display = 'flex';
            if (gameActive && modeSelectRoot.value === 'sandbox' && timeLimitSelect.value === 'infinite') {
                overlayTitle.textContent = "PAUSED";
                overlayDesc.textContent = "Click to resume.";
            } else if (inCountdown || gameActive) {
                resetSessionState();
                overlayTitle.textContent = "STOPPED";
                overlayDesc.textContent = "Session interrupted. Click to retry.";
            }
        }
    });

    function runStartCountdown() {
        inCountdown = true;
        gameActive = false;
        target.x = 0; target.y = 0;
        isHoveringTarget = false;
        
        score = 0;
        totalClicks = 0;
        updateHUD();

        let count = 3;
        countdownText.textContent = count;
        countdownText.style.display = 'block';

        let countInterval = setInterval(() => {
            if (!isLocked) {
                clearInterval(countInterval);
                return;
            }
            count--;
            if (count > 0) {
                countdownText.textContent = count;
            } else if (count === 0) {
                countdownText.textContent = "GO";
            } else {
                clearInterval(countInterval);
                countdownText.style.display = 'none';
                inCountdown = false;
                startSession();
            }
        }, 800);
    }

    function startSession() {
        gameActive = true;
        spawnTarget();
        updateHUD();

        if (modeSelectRoot.value === 'arcade') {
            timeRemaining = tiers[currentTier].time;
        } else {
            const limit = timeLimitSelect.value;
            if (limit === 'infinite') {
                timeVal.textContent = "LOOP";
                return;
            }
            timeRemaining = parseInt(limit);
        }
        
        timeVal.textContent = timeRemaining + "s";

        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!isLocked) return;
            
            timeRemaining--;
            timeVal.textContent = timeRemaining + "s";

            if (timeRemaining <= 0) {
                endSession(false);
            }
        }, 1000);
    }

    function resetSessionState() {
        gameActive = false;
        inCountdown = false;
        isHoveringTarget = false;
        clearInterval(timerInterval);
        countdownText.style.display = 'none';
        target.x = 0; target.y = 0;
    }

    function endSession(hitQuotaReached = false) {
        gameActive = false;
        isHoveringTarget = false;
        clearInterval(timerInterval);
        document.exitPointerLock();

        const finalAcc = totalClicks === 0 ? 0 : Math.round((score / totalClicks) * 100);

        overlayTitle.textContent = "ROUND FINISHED";
        overlayTitle.style.color = "var(--accent)";

        if (modeSelectRoot.value === 'sandbox') {
            overlayDesc.innerHTML = `<b>Sandbox Summary</b><br>Hits: <b>${score}</b><br>Accuracy: <b>${finalAcc}%</b><br><br>Click window to restart.`;
            return;
        }

        const config = tiers[currentTier];
        const passed = hitQuotaReached || (score >= config.reqScore && finalAcc >= config.reqAcc);

        if (passed) {
            if (currentTier < 10) {
                overlayDesc.innerHTML = `<span style="color:var(--accent);"><b>${config.name} CLEARED</b></span><br>Score: ${score}/${config.reqScore}<br>Acc: ${finalAcc}%/${config.reqAcc}%<br><br><b>Click to progress to Tier ${currentTier + 1}.</b>`;
                currentTier++;
            } else {
                overlayDesc.innerHTML = `<span style="color:var(--accent);"><b>CAMPAIGN COMPLETE</b></span><br>You have finished all levels.<br>Score: ${score}/${config.reqScore}<br>Acc: ${finalAcc}%/${config.reqAcc}%<br><br>Click to restart loop.`;
                currentTier = 1;
            }
        } else {
            overlayTitle.style.color = "var(--target)";
            overlayDesc.innerHTML = `<span style="color:var(--target);"><b>${config.name} FAILED</b></span><br>Score: ${score}/${config.reqScore}<br>Acc: ${finalAcc}%/${config.reqAcc}%<br><br><b>Click canvas frame to retry.</b>`;
        }
        
        saveSettings();
        updateSystemView();
    }

    document.addEventListener('mousemove', (e) => {
        if (!isLocked) return;
        
        const dpi = parseFloat(dpiInput.value) || 400;
        const sens = parseFloat(sensInput.value) || 0.23;
        const multiplier = (sens * (dpi / 400)) * 2.5;

        player.x += e.movementX * multiplier;
        player.y += e.movementY * multiplier;

        player.x = Math.max(0, Math.min(canvas.width, player.x));
        player.y = Math.max(0, Math.min(canvas.height, player.y));
    });

    canvas.addEventListener('mousedown', () => {
        if (!isLocked || inCountdown || !gameActive) return;

        totalClicks++;
        
        let size;
        if (modeSelectRoot.value === 'arcade') {
            size = tiers[currentTier].size;
        } else {
            size = parseInt(sizeSelect.value);
        }

        const dist = Math.hypot(player.x - target.x, player.y - target.y);

        if (dist <= size) {
            score++;
            updateHUD();

            if (modeSelectRoot.value === 'arcade') {
                const config = tiers[currentTier];
                const currentAcc = Math.round((score / totalClicks) * 100);
                
                if (score >= config.reqScore && currentAcc >= config.reqAcc) {
                    endSession(true);
                    return;
                }
            }
            spawnTarget();
            
            let newSize;
            if (modeSelectRoot.value === 'arcade') {
                newSize = tiers[currentTier].size;
            } else {
                newSize = parseInt(sizeSelect.value);
            }
            const newDist = Math.hypot(player.x - target.x, player.y - target.y);
            isHoveringTarget = (newDist <= newSize);
        } else {
            updateHUD();
        }
    });

    function updateHUD() {
        const finalAcc = totalClicks === 0 ? 100 : Math.round((score / totalClicks) * 100);
        scoreVal.textContent = score;
        accVal.textContent = finalAcc + "%";

        if (modeSelectRoot.value === 'arcade') {
            const activeConfig = tiers[currentTier];
            hudTargetGoal.innerHTML = `Hits: <b>${score}/${activeConfig.reqScore}</b> | Acc: <b>${finalAcc}%/${activeConfig.reqAcc}%</b>`;
        }
    }

    resetBtn.addEventListener('click', () => {
        localStorage.removeItem('aimtrainer_settings');
        score = 0;
        totalClicks = 0;
        currentTier = 1;
        
        themeSelect.value = "mint";
        applyThemeAttribute("mint");
        modeSelectRoot.value = "sandbox";
        timeLimitSelect.value = "15";
        modeSelect.value = "flick";
        speedSelect.value = "12";
        sizeSelect.value = "28";
        dpiInput.value = "400";
        sensInput.value = "0.23";
        crosshairSize.value = "10";

        resetSessionState();
        updateSystemView();
        updateHUD();
    });

    function spawnTarget() {
        let size;
        if (modeSelectRoot.value === 'arcade') {
            size = tiers[currentTier].size;
        } else {
            size = parseInt(sizeSelect.value);
        }

        target.x = size + Math.random() * (canvas.width - size * 2);
        target.y = size + Math.random() * (canvas.height - size * 2);
        
        const angle = Math.random() * Math.PI * 2;
        target.vx = Math.cos(angle);
        target.vy = Math.sin(angle);
    }

    function gameLoop() {
        const currentStyles = getComputedStyle(document.body);
        const colorGameBg = currentStyles.getPropertyValue('--bg-game').trim();
        const colorAccent = currentStyles.getPropertyValue('--accent').trim();
        const colorTarget = currentStyles.getPropertyValue('--target').trim();

        ctx.fillStyle = colorGameBg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let mode, size, speed;
        if (modeSelectRoot.value === 'arcade') {
            const activeRule = tiers[currentTier];
            mode = activeRule.mode;
            size = activeRule.size;
            speed = activeRule.speed / 3;
        } else {
            mode = modeSelect.value;
            size = parseInt(sizeSelect.value);
            speed = parseInt(speedSelect.value) / 3;
        }

        if (mode === 'follow' && gameActive && !inCountdown) {
            target.x += target.vx * speed;
            target.y += target.vy * speed;

            if (target.x <= size) { target.x = size; target.vx *= -1; }
            if (target.x >= canvas.width - size) { target.x = canvas.width - size; target.vx *= -1; }
            if (target.y <= size) { target.y = size; target.vy *= -1; }
            if (target.y >= canvas.height - size) { target.y = canvas.height - size; target.vy *= -1; }
        }

        if (gameActive && !inCountdown && target.x !== 0 && target.y !== 0) {
            const distance = Math.hypot(player.x - target.x, player.y - target.y);
            isHoveringTarget = (distance <= size);

            ctx.beginPath();
            ctx.arc(target.x, target.y, size, 0, Math.PI * 2);
            ctx.fillStyle = colorTarget;
            ctx.fill();
            ctx.closePath();
        } else {
            isHoveringTarget = false;
        }

        if (isLocked) {
            ctx.lineWidth = 2;
            const cSize = parseInt(crosshairSize.value);
            
            if (isHoveringTarget) {
                ctx.fillStyle = colorAccent;
                ctx.beginPath();
                ctx.arc(player.x, player.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.closePath();

                ctx.strokeStyle = colorAccent;
                ctx.beginPath();
                
                const gap = Math.round(cSize * 0.4);
                const length = cSize;

                ctx.moveTo(player.x - length, player.y);
                ctx.lineTo(player.x - gap, player.y);
                ctx.moveTo(player.x + gap, player.y);
                ctx.lineTo(player.x + length, player.y);
                ctx.moveTo(player.x, player.y - length);
                ctx.lineTo(player.x, player.y - gap);
                ctx.moveTo(player.x, player.y + gap);
                ctx.lineTo(player.x, player.y + length);
                
                ctx.stroke();
                ctx.closePath();
            } else {
                ctx.strokeStyle = colorAccent;
                ctx.beginPath();
                
                const half = Math.round(cSize * 0.7);
                
                ctx.moveTo(player.x - half, player.y);
                ctx.lineTo(player.x + half, player.y);
                ctx.moveTo(player.x, player.y - half);
                ctx.lineTo(player.x, player.y + half);
                
                ctx.stroke();
                ctx.closePath();
            }
        }

        requestAnimationFrame(gameLoop);
    }

    loadSettings();
    updateSystemView();
    gameLoop();
</script>
